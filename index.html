<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>S'more Space</title>
  <style>
    :root {
      --bg-top: #1d2851;
      --bg-bottom: #0d1228;
      --panel: rgba(15, 20, 44, 0.88);
      --panel-border: rgba(255, 216, 155, 0.35);
      --accent: #ffb347;
      --accent-dark: #f47b45;
      --accent-soft: #ffe6b9;
      --text: #fff7eb;
      --muted: #d8cee0;
      --button-text: #291715;
      --danger: #ff8f8f;
    }

    * {
      box-sizing: border-box;
    }

    body {
      margin: 0;
      min-height: 100vh;
      font-family: "Trebuchet MS", "Segoe UI", sans-serif;
      color: var(--text);
      background:
        radial-gradient(circle at top, rgba(255, 208, 138, 0.18), transparent 30%),
        linear-gradient(180deg, var(--bg-top), var(--bg-bottom));
    }

    body::before,
    body::after {
      content: "";
      position: fixed;
      inset: 0;
      pointer-events: none;
    }

    body::before {
      background:
        radial-gradient(circle at 15% 20%, rgba(255, 255, 255, 0.16) 0 2px, transparent 3px),
        radial-gradient(circle at 80% 18%, rgba(255, 255, 255, 0.16) 0 2px, transparent 3px),
        radial-gradient(circle at 68% 42%, rgba(255, 255, 255, 0.16) 0 2px, transparent 3px),
        radial-gradient(circle at 25% 65%, rgba(255, 255, 255, 0.12) 0 2px, transparent 3px),
        radial-gradient(circle at 90% 72%, rgba(255, 255, 255, 0.12) 0 2px, transparent 3px);
      opacity: 0.95;
    }

    body::after {
      background: linear-gradient(180deg, transparent 60%, rgba(16, 9, 30, 0.65));
    }

    .screen-shell {
      min-height: 100vh;
      display: grid;
      place-items: center;
      padding: 24px;
    }

    .panel {
      width: min(100%, 720px);
      background: var(--panel);
      border: 2px solid var(--panel-border);
      border-radius: 28px;
      padding: 28px;
      box-shadow: 0 22px 60px rgba(0, 0, 0, 0.35);
      backdrop-filter: blur(6px);
    }

    .title-art {
      text-align: center;
      margin-bottom: 28px;
    }

    .eyebrow {
      margin: 0 0 10px;
      color: var(--accent-soft);
      font-size: 0.95rem;
      letter-spacing: 0.14em;
      text-transform: uppercase;
    }

    h1 {
      margin: 0;
      font-size: clamp(2.5rem, 8vw, 4.8rem);
      line-height: 0.95;
      color: var(--accent-soft);
      text-shadow: 0 4px 18px rgba(0, 0, 0, 0.35);
    }

    .subtitle {
      margin: 14px auto 0;
      max-width: 32rem;
      color: var(--muted);
      font-size: 1.05rem;
      line-height: 1.5;
    }

    .button-stack {
      display: grid;
      gap: 14px;
      width: min(100%, 320px);
      margin: 0 auto;
    }

    button {
      border: 0;
      border-radius: 999px;
      padding: 14px 18px;
      font: inherit;
      font-size: 1rem;
      font-weight: 700;
      cursor: pointer;
      transition: transform 0.18s ease, box-shadow 0.18s ease, opacity 0.18s ease;
    }

    button:hover {
      transform: translateY(-1px);
      box-shadow: 0 10px 24px rgba(0, 0, 0, 0.2);
    }

    button:disabled {
      cursor: not-allowed;
      opacity: 0.6;
      transform: none;
      box-shadow: none;
    }

    .primary-button {
      background: linear-gradient(180deg, var(--accent), var(--accent-dark));
      color: var(--button-text);
    }

    .secondary-button {
      background: rgba(255, 255, 255, 0.1);
      color: var(--text);
      border: 1px solid rgba(255, 255, 255, 0.15);
    }

    .section-title {
      margin: 0 0 10px;
      font-size: clamp(1.8rem, 5vw, 2.6rem);
      color: var(--accent-soft);
      text-align: center;
    }

    .section-copy {
      margin: 0 auto 20px;
      max-width: 34rem;
      color: var(--muted);
      line-height: 1.55;
      text-align: center;
    }

    .players-panel {
      display: grid;
      gap: 16px;
    }

    .player-row {
      display: grid;
      grid-template-columns: 1fr auto;
      gap: 10px;
      align-items: center;
    }

    .player-row label {
      display: none;
    }

    input[type="text"] {
      width: 100%;
      border: 1px solid rgba(255, 255, 255, 0.2);
      border-radius: 16px;
      background: rgba(255, 255, 255, 0.08);
      color: var(--text);
      padding: 14px 16px;
      font: inherit;
    }

    input[type="text"]::placeholder {
      color: rgba(255, 247, 235, 0.6);
    }

    .remove-button {
      background: rgba(255, 143, 143, 0.14);
      color: var(--danger);
      border: 1px solid rgba(255, 143, 143, 0.35);
      min-width: 92px;
    }

    .button-row {
      display: flex;
      flex-wrap: wrap;
      gap: 12px;
      justify-content: center;
      margin-top: 8px;
    }

    .helper-text,
    .status-text {
      margin: 0;
      text-align: center;
      color: var(--muted);
    }

    .status-text {
      min-height: 24px;
    }

    .launch-card {
      margin-top: 10px;
      padding: 18px;
      border-radius: 20px;
      background: rgba(255, 179, 71, 0.12);
      border: 1px solid rgba(255, 179, 71, 0.28);
      text-align: center;
      color: var(--accent-soft);
    }

    @media (max-width: 640px) {
      .panel {
        padding: 22px 18px;
        border-radius: 22px;
      }

      .player-row {
        grid-template-columns: 1fr;
      }

      .remove-button {
        width: 100%;
      }

      .button-row {
        flex-direction: column;
      }
    }
  </style>
</head>
<body>
  <div id="app"></div>
  <script defer src="./smore-space.js"></script>
</body>
</html>
